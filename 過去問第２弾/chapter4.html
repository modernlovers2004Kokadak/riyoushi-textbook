<style>

ist-style:none;cursor:pointer;padding:14px 16px;font-size:16px;font-weight:400}summary::-webkit-details-marker{display:none}.group>summary,.item>summary{background:#fff}.item>summary{border-bottom:1px solid var(--line)}.content{padding:12px}.block{font-size:16px;font-weight:400;line-height:1.75;margin:10px 0;padding:13px 14px;border-radius:14px;border:1px solid rgba(0,0,0,.06);white-space:normal}.quiz{background:var(--quiz)}.question{margin:0 0 8px}.choice{display:block;width:100%;text-align:left;border:1px solid #d9dde8;background:#fff;border-radius:12px;padding:11px 12px;margin:8px 0;font-size:16px;font-weight:400;color:var(--ink);line-height:1.6}.choice.correct{background:#dff3e4;border-color:#188038}.choice.wrong{background:#fde8e8;border-color:#d93025}.answerbox,.expbox{border:1px solid rgba(0,0,0,.06);border-radius:14px;margin:10px 0}.answerbox{background:var(--ans)}.expbox{background:var(--exp)}.answerbox summary,.expbox summary{padding:12px 14px}.answerbox div,.expbox div{padding:0 14px 14px;white-space:pre-wrap}.done{font-weight:400;font-size:16px;display:block;margin-top:12px}.done input{width:20px;height:20px;vertical-align:middle}.stars,.count{display:inline-block;font-size:16px;font-weight:400;color:#5f6368;background:#f1f3f4;border-radius:999px;padding:1px 8px;margin-left:6px}.nav-back{max-width:860px;margin:10px auto 0;padding:0 12px}.nav-back a{display:inline-block;border:1px solid #d9cff5;background:#fff;border-radius:999px;padding:8px 14px;text-decoration:none;color:#4c32b4;font-size:15px;font-weight:400;box-shadow:var(--shadow)}.nav-back a:before{content:"← "}@media(max-width:520px){header{padding:16px 14px}main{padding:10px}summary{padding:13px 14px}.content{padding:10px}.block{padding:12px;margin:9px 0;border-radius:13px}.choice{padding:11px 10px}.toolbar button{flex:1 1 auto}.topnav a{padding:14px}}

<script>
(function(){
const NS='riyouStudy:v3:';
function pageKey(){return location.pathname.replace(/^\//,'');}
window.studyKey=function(id){return NS+pageKey()+':'+id};
window.studyRead=function(id){try{return JSON.parse(localStorage.getItem(studyKey(id))||'{}')}catch(e){return {}}};
window.studySave=function(id, ok){const r=studyRead(id);r.answered=(r.answered||0)+1;r.correct=(r.correct||0)+(ok?1:0);r.wrong=(r.wrong||0)+(ok?0:1);r.last=Date.now();localStorage.setItem(studyKey(id),JSON.stringify(r));};
window.studyDone=function(id,done){const r=studyRead(id);r.done=!!done;localStorage.setItem(studyKey(id),JSON.stringify(r));};
window.studyStats=function(ids){let answered=0,correct=0,done=0,wrong=0;ids.forEach(id=>{const r=studyRead(id); if(r.answered){answered++; correct+=(r.correct?1:0); wrong+=(r.wrong?1:0)} if(r.done)done++;}); return {answered,correct,done,wrong,rate:answered?Math.round(correct/answered*100):0,total:ids.length};};
})();
</script>

<script>const DATA={"title":"第４章　香粧品化学 第２弾","groups":[{"title":"整理済みテーマ","items":[{"id":"4-1","no":"問題1","topic":"界面活性剤","level":"★★★★☆","question":"次の記述のうち、誤っているものはどれか。","choices":["水と油をなじませ、洗浄や乳化に関与する。","界面活性剤では、親水基と親油基。","界面活性剤は、確認・区分・衛生配慮を組み合わせて判断する。","界面活性剤では、記録・確認・区分などの手順は試験上ほとんど問われない。"],"answer":3,"explain":"界面活性剤は、国家試験で問われやすい基本事項です。正解は「水と油をなじませ、洗浄や乳化に関与する。」という考え方に合う選択肢です。選択肢では「常に」「すべて」「だけでよい」などの断定表現に注意します。","memory":"水と油をなじませ、洗浄や乳化に関与する。","trap":"親水基と親油基。"},{"id":"4-2","no":"問題2","topic":"リンス・コンディショナー","level":"★★★☆☆","question":"実務上の判断として最も不適切なものはどれか。","choices":["リンス・コンディショナーは、確認・区分・衛生配慮を組み合わせて判断する。","リンス・コンディショナーでは、異常や違反があっても、結果的に事故がなければ問題にならない。","毛髪表面を整え、手触りや帯電を改善する。","リンス・コンディショナーでは、洗浄剤ではない。"],"answer":1,"explain":"リンス・コンディショナーは、国家試験で問われやすい基本事項です。正解は「毛髪表面を整え、手触りや帯電を改善する。」という考え方に合う選択肢です。選択肢では「常に」「すべて」「だけでよい」などの断定表現に注意します。","memory":"毛髪表面を整え、手触りや帯電を改善する。","trap":"洗浄剤ではない。"},{"id":"4-3","no":"問題3","topic":"ヘアカラー","level":"★★★★☆","question":"ひっかけ問題として、誤りを含むものはどれか。","choices":["酸化染毛剤などは染料と酸化反応が関係する。","ヘアカラーでは、パッチテストが重要。","ヘアカラーは、確認・区分・衛生配慮を組み合わせて判断する。","ヘアカラーは、一度覚えたら法令や基準の変更を確認しなくてよい。"],"answer":3,"explain":"ヘアカラーは、国家試験で問われやすい基本事項です。正解は「酸化染毛剤などは染料と酸化反応が関係する。」という考え方に合う選択肢です。選択肢では「常に」「すべて」「だけでよい」などの断定表現に注意します。","memory":"酸化染毛剤などは染料と酸化反応が関係する。","trap":"パッチテストが重要。"},{"id":"4-4","no":"問題4","topic":"酸とアルカリ","level":"★★★★☆","question":"安全・衛生の観点から最も適切なものはどれか。","choices":["酸とアルカリでは、異常や違反があっても、結果的に事故がなければ問題にならない。","水素イオン濃度により性質が変わる。","酸とアルカリは、一度覚えたら法令や基準の変更を確認しなくてよい。","酸とアルカリでは、清潔物と使用済み物を同じ場所に戻しても、見た目が整っていればよい。"],"answer":1,"explain":"酸とアルカリは、国家試験で問われやすい基本事項です。正解は「水素イオン濃度により性質が変わる。」という考え方に合う選択肢です。選択肢では「常に」「すべて」「だけでよい」などの断定表現に注意します。","memory":"水素イオン濃度により性質が変わる。","trap":"ペーハーの大小。"},{"id":"4-5","no":"問題5","topic":"毛髪の結合","level":"★★★☆☆","question":"次のうち、最も適切なものはどれか。","choices":["毛髪の結合は、衛生や安全よりも営業上の都合を常に優先する考え方である。","毛髪の結合では、シスチン結合だけを覚えれば足り、ほかの条件は無視してよい。","毛髪の結合では、記録・確認・区分などの手順は試験上ほとんど問われない。","シスチン結合、水素結合、塩結合などが性質に関与する。"],"answer":3,"explain":"毛髪の結合は、国家試験で問われやすい基本事項です。正解は「シスチン結合、水素結合、塩結合などが性質に関与する。」という考え方に合う選択肢です。選択肢では「常に」「すべて」「だけでよい」などの断定表現に注意します。","memory":"シスチン結合、水素結合、塩結合などが性質に関与する。","trap":"パーマとの関係。"},{"id":"4-6","no":"問題6","topic":"防腐剤","level":"★★★★☆","question":"国家試験対策として正しい理解はどれか。","choices":["防腐剤は、理容師本人ではなく客だけが判断すれば足りる。","微生物による変質を防ぐために配合される。","防腐剤については、客の希望があれば法令・衛生管理上の制限をすべて省略できる。","防腐剤では、微生物による変質を防ぐために配合されるだけを覚えれば足り、ほかの条件は無視してよい。"],"answer":1,"explain":"防腐剤は、国家試験で問われやすい基本事項です。正解は「微生物による変質を防ぐために配合される。」という考え方に合う選択肢です。選択肢では「常に」「すべて」「だけでよい」などの断定表現に注意します。","memory":"微生物による変質を防ぐために配合される。","trap":"安全な範囲で使用。"},{"id":"4-7","no":"問題7","topic":"香料","level":"★★★★☆","question":"このテーマで押さえるべき内容として正しいものはどれか。","choices":["香料は、一度覚えたら法令や基準の変更を確認しなくてよい。","香料では、記録・確認・区分などの手順は試験上ほとんど問われない。","香料では、においを付与・調整する目的で用いるだけを覚えれば足り、ほかの条件は無視してよい。","においを付与・調整する目的で用いる。"],"answer":3,"explain":"香料は、国家試験で問われやすい基本事項です。正解は「においを付与・調整する目的で用いる。」という考え方に合う選択肢です。選択肢では「常に」「すべて」「だけでよい」などの断定表現に注意します。","memory":"においを付与・調整する目的で用いる。","trap":"アレルギーへの配慮。"}]}]};
const PAGE_ID="過去問第２弾/chapter4.html";
window.studyKey=function(id){return 'riyouStudy:v3:'+PAGE_ID+':'+id};
const app=document.getElementById('app');
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function allItems(){let a=[]; if(Array.isArray(DATA)){DATA.forEach(ch=>(ch.groups||[]).forEach(g=>(g.items||[]).forEach(it=>a.push(it))))}else{(DATA.groups||[]).forEach(g=>(g.items||[]).forEach(it=>a.push(it)))} return a;}
function qid(it,idx){return 'q'+idx}
function render(){const ids=allItems().map((_,i)=>qid(_,i));app.innerHTML=`<section class="toolbar"><button onclick="openAll()">すべて開く</button><button onclick="closeAll()">すべて閉じる</button><button class="wrong-random" onclick="showWrongRandom()">間違えた問題をランダムに表示</button><button onclick="resetMarks()">学習記録を消す</button></section><div id="randomBox"></div>`+(Array.isArray(DATA)?DATA.map(ch=>`<details class="chapter" open><summary>${esc(ch.title)}</summary><div class="content">${(ch.groups||[]).map(g=>`<details class="group" open><summary>${esc(g.title)}<span class="count">${g.items.length}問</span></summary><div class="content">${g.items.map((it)=>itemHtml(it,allItems().indexOf(it))).join('')}</div></details>`).join('')}</div></details>`).join(''):(DATA.groups||[]).map(g=>`<details class="group" open><summary>${esc(g.title)}<span class="count">${g.items.length}問</span></summary><div class="content">${g.items.map((it)=>itemHtml(it,allItems().indexOf(it))).join('')}</div></details>`).join(''));bindChecks();}
function itemHtml(it,idx){const id=qid(it,idx), r=studyRead(id), checked=r.done?'checked':'';const title=it.no?`${esc(it.no)}　${esc(it.topic)}`:esc(it.title);const lv=it.level||it.importance||''; const extra=it.original?`<section class="block law">${esc(it.original)}</section><section class="block easy">${esc(it.plain)}</section><section class="block point"><ul class="points">${(it.points||[]).map(p=>`<li>${esc(p)}</li>`).join('')}</ul></section>`:''; const exp=it.original?`<section class="block exp">答え：${it.answer+1}<br>${esc(it.explain)}</section>`:`<details class="answerbox"><summary>正解を表示</summary><div>正解：${it.answer+1}</div></details><details class="expbox"><summary>解説を表示</summary><div>${esc(it.explain)}<br><br>この問題で覚えること：${esc(it.memory||'')}<br>ひっかけポイント：${esc(it.trap||'')}</div></details>`;return `<details class="item" data-qid="${id}"><summary>${title}<span class="stars">${esc(lv)}</span></summary><div class="content">${extra}<section class="block quiz"><p class="question">${esc(it.question)}</p>${it.choices.map((c,i)=>`<button class="choice" onclick="answer(this,${i},${it.answer},'${id}')">${i+1}　${esc(c)}</button>`).join('')}</section>${exp}<label class="done"><input type="checkbox" data-id="${id}" ${checked}> 学習済み</label></div></details>`;}
function answer(btn,val,ans,id){const ok=val===ans;const q=btn.closest('.quiz');q.querySelectorAll('.choice').forEach((b,i)=>{b.classList.remove('correct','wrong','selected');if(i===ans)b.classList.add('correct');});btn.classList.add('selected');if(!ok)btn.classList.add('wrong');studySave(id,ok);const c=btn.closest('.content');const exp=c.querySelector('.exp');if(exp)exp.style.display='block';const ab=c.querySelector('.answerbox');if(ab)ab.open=true;const eb=c.querySelector('.expbox');if(eb)eb.open=true;updatePageStats();}
function bindChecks(){document.querySelectorAll('input[data-id]').forEach(ch=>{ch.onchange=()=>{studyDone(ch.dataset.id,ch.checked);updatePageStats();};});}
function updatePageStats(){}
function showWrongRandom(){const items=allItems().map((it,i)=>({it,idx:i,id:qid(it,i),r:studyRead(qid(it,i))})).filter(x=>(x.r.wrong||0)>0);const box=document.getElementById('randomBox');if(!items.length){box.innerHTML='<section class="wrong-empty">間違えた問題はまだありません。</section>';return;}const pick=items[Math.floor(Math.random()*items.length)];box.innerHTML='<details class="item" open><summary>間違えた問題からランダム表示</summary><div class="content">'+itemHtml(pick.it,pick.idx)+'</div></details>';}
function openAll(){document.querySelectorAll('details').forEach(d=>d.open=true)}
function closeAll(){document.querySelectorAll('details.item').forEach(d=>d.open=false)}
function resetMarks(){if(confirm('学習記録を消しますか')){Object.keys(localStorage).filter(k=>k.startsWith('riyouStudy:v3:'+PAGE_ID+':')).forEach(k=>localStorage.removeItem(k));render();}}
render();

function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function render(){app.innerHTML=`<section class="toolbar"><button onclick="openAll()">すべて開く</button><button onclick="closeAll()">すべて閉じる</button><button onclick="resetMarks()">学習記録を消す</button></section>`+DATA.groups.map(g=>`<details class="group" open><summary>${esc(g.title)}<span class="count">${g.items.length}問</span></summary><div class="content">${g.items.map(itemHtml).join('')}</div></details>`).join('');bindChecks();}
function itemHtml(it){const checked=localStorage.getItem(K+it.id)==='1'?'checked':'';return `<details class="item"><summary>${esc(it.no)}　${esc(it.topic)}<span class="stars">${esc(it.level)}</span></summary><div class="content"><section class="block quiz"><p class="question">${esc(it.question)}</p>${it.choices.map((c,i)=>`<button class="choice" onclick="answer(this,${i},${it.answer})">${i+1}　${esc(c)}</button>`).join('')}</section><details class="answerbox"><summary>正解を表示</summary><div>正解：${it.answer+1}</div></details><details class="expbox"><summary>解説を表示</summary><div>${esc(it.explain)}<br><br>この問題で覚えること：${esc(it.memory)}<br>ひっかけポイント：${esc(it.trap)}</div></details><label class="done"><input type="checkbox" data-id="${esc(it.id)}" ${checked}> 学習済み</label></div></details>`;}
function answer(btn,val,ans){const q=btn.closest('.quiz');q.querySelectorAll('.choice').forEach((b,i)=>{b.classList.remove('correct','wrong');if(i===ans)b.classList.add('correct');});if(val!==ans)btn.classList.add('wrong');btn.closest('.content').querySelector('.answerbox').open=true;btn.closest('.content').querySelector('.expbox').open=true;}
function bindChecks(){document.querySelectorAll('input[data-id]').forEach(ch=>{ch.onchange=()=>localStorage.setItem(K+ch.dataset.id,ch.checked?'1':'0');});}
function openAll(){document.querySelectorAll('details').forEach(d=>d.open=true)}
function closeAll(){document.querySelectorAll('details.item').forEach(d=>d.open=false)}
function resetMarks(){if(confirm('学習済みを消しますか')){Object.keys(localStorage).filter(k=>k.startsWith(K)).forEach(k=>localStorage.removeItem(k));render();}}
render();</script></body></html>

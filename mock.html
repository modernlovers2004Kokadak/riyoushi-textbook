<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>⑧総合模試</title>
<style>
*{box-sizing:border-box}
:root{--bg:#faf9f6;--card:#fff;--text:#171923;--muted:#555b66;--line:#e8e1f8;--purple:#5b3cc4;--ok:#dff3e4;--ng:#fde8e8;--shadow:0 8px 20px rgba(32,24,72,.10)}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;font-weight:400}
.app{max-width:900px;margin:0 auto;padding:14px}
header{background:linear-gradient(135deg,#6748d8,#4c32b4);color:#fff;padding:18px 16px;text-align:center}
h1{font-size:20px;margin:0;font-weight:400;letter-spacing:.03em}
.back{display:inline-block;margin:14px 0 10px;border:1px solid #d9cff5;background:#fff;border-radius:999px;padding:8px 14px;text-decoration:none;color:#4c32b4;box-shadow:var(--shadow);font-weight:400}
.notice{background:#fff;border:1px solid #d9cff5;border-radius:16px;padding:13px 14px;margin:10px 0 14px;box-shadow:var(--shadow);color:#444;font-weight:400}
.setgrid{display:grid;gap:10px;margin:10px 0 16px}
.btn{display:block;width:100%;text-align:left;border:1.5px solid #d9cff5;background:#fff;border-radius:16px;padding:14px 16px;font-size:16px;color:var(--text);box-shadow:var(--shadow);font-weight:400;cursor:pointer}
.btn:hover{background:#fbf9ff}
.exam-title{background:#fff;border:1.5px solid #d9cff5;border-radius:18px;padding:15px 16px;margin:14px 0;box-shadow:var(--shadow);font-weight:400;color:#4c32b4}
.quiz{background:#fff;border:1.5px solid #e5def8;border-radius:18px;padding:14px;margin:12px 0;box-shadow:var(--shadow)}
.qhead{font-size:15px;color:#5f6368;margin-bottom:8px;font-weight:400}
.qtopic{font-size:16px;margin-bottom:8px;color:#4c32b4;font-weight:400}
.questionText{font-size:17px;line-height:1.75;margin:8px 0 12px;white-space:pre-wrap;font-weight:400}
.choice{display:block;width:100%;text-align:left;border:1px solid #d9dde8;background:#fff;border-radius:13px;padding:11px 12px;margin:8px 0;font-size:16px;line-height:1.6;color:var(--text);font-weight:400;cursor:pointer}
.choice.selected{outline:2px solid #bbaaf0}
.choice.correct{background:var(--ok);border-color:#188038}
.choice.wrong{background:var(--ng);border-color:#d93025}
details{margin-top:10px;border:1px solid #e7e0f8;background:#fbf9ff;border-radius:13px;padding:0}
summary{cursor:pointer;padding:10px 12px;font-weight:400;list-style:none}
summary::-webkit-details-marker{display:none}
.explain{padding:0 12px 12px;color:#333;white-space:pre-wrap;font-weight:400}
.result{background:#fff;border:1.5px solid #d9cff5;border-radius:16px;padding:14px;margin:14px 0;box-shadow:var(--shadow);font-weight:400}
.actions{display:grid;gap:10px;margin:14px 0}
@media(max-width:520px){.app{padding:10px} header{padding:16px 14px} .quiz{padding:12px} .questionText{font-size:16px}}
</style>
</head>

<script>
const RAW=document.getElementById('setsData').textContent.trim();
const SETS=JSON.parse(decodeURIComponent(escape(atob(RAW))));
let current=-1;
let answers={};
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function init(){
  const holder=document.getElementById('sets');
  holder.innerHTML=SETS.map((s,i)=>`<button class="btn" type="button" onclick="start(${i})">総合模試${i+1}　${s.length}問</button>`).join('');
}
function start(i){
  current=i; answers={};
  const s=SETS[i];
  const exam=document.getElementById('exam');
  exam.innerHTML=`<div class="exam-title">総合模試${i+1}　${s.length}問</div>`+
    s.map((q,idx)=>quizHtml(q,idx)).join('')+
    `<div class="actions"><button class="btn" type="button" onclick="score()">採点する</button></div><div id="score"></div>`;
  window.scrollTo(0,0);
}
function quizHtml(q,idx){
  const title=q.topic||q.title||'';
  const question=q.question||q.title||q.topic||'問題文を確認してください。';
  const choices=Array.isArray(q.choices)?q.choices:[];
  return `<section class="quiz" data-idx="${idx}">
    <div class="qhead">問題${idx+1}</div>
    <div class="qtopic">${esc(title)}</div>
    <div class="questionText">${esc(question)}</div>
    ${choices.map((c,ci)=>`<button class="choice" type="button" onclick="choose(${idx},${ci},this)">${ci+1}　${esc(c)}</button>`).join('')}
    <details><summary>解説を表示</summary><div class="explain">正解：${Number(q.answer)+1}
${esc(q.explain||'')}${q.memory?'

覚えること：'+esc(q.memory):''}</div></details>
  </section>`;
}
function choose(idx,ci,btn){
  answers[idx]=ci;
  const box=btn.closest('.quiz');
  box.querySelectorAll('.choice').forEach(b=>b.classList.remove('selected','correct','wrong'));
  btn.classList.add('selected');
}
function score(){
  if(current<0)return;
  const s=SETS[current];
  let ok=0;
  s.forEach((q,idx)=>{
    const box=document.querySelector(`.quiz[data-idx="${idx}"]`);
    if(!box)return;
    box.querySelectorAll('.choice').forEach((b,ci)=>{
      b.classList.remove('selected','correct','wrong');
      if(ci===Number(q.answer)) b.classList.add('correct');
      if(answers[idx]===ci && ci!==Number(q.answer)) b.classList.add('wrong');
    });
    if(answers[idx]===Number(q.answer)) ok++;
  });
  const rate=Math.round(ok/s.length*100);
  document.getElementById('score').innerHTML=`<div class="result">得点：${ok}/${s.length}問　正答率：${rate}%</div>`;
  try{localStorage.setItem('riyouStudy:v3:mock:'+current,JSON.stringify({ok,total:s.length,rate,last:Date.now()}));}catch(e){}
}
document.addEventListener('DOMContentLoaded',init);
</script>
